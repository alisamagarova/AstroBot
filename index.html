<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root { --ds-serif: 'Lora', Georgia, serif; --ds-sans: 'Manrope', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0a0812; }
  #root { width: 100vw; height: 100vh; }

  @keyframes astroInF { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes astroInB { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
  .astro-in-f { animation: astroInF .34s cubic-bezier(.2,.7,.3,1); }
  .astro-in-b { animation: astroInB .34s cubic-bezier(.2,.7,.3,1); }
  @keyframes astroSpin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .astro-in-f, .astro-in-b { animation: none; }
  }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>

      try {
        tg.ready();
        tg.expand();
        // подстраиваем фон под тему приложения

    }
